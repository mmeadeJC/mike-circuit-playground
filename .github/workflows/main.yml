name: CI

on:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::642920845081:role/GithubActionsCI-circuit-playground
          role-session-name: GithubActionsSession

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          export CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token --domain jumpcloud-artifacts --query authorizationToken --output text)
          npm install -g pnpm@8.15.9 && pnpm install --frozen-lockfile

      - run: pnpm build-storybook
      - run: pnpm build:demos
